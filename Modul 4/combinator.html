<!DOCTYPE html>
<html lang="en">
    <head> 
        <title>Belajar Simple Selektor</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, intital-scale=1">
        <meta name="author" content="Alfi Mariani">
        <meta name="nim" content="253307033">

        <style>
            div p { /* no 1 */
             color: red;
            }
            div > p { /* no 2*/
             background-color: yellow;
            }
            div + p { /* no 3*/
             background-color: darkgray;
            }
            div ~ p { /* no 4 */
                color: cyan;
            }
        </style>
    </head>

    <body>
        <div>
            <p>This is a paragraph. Terangkan kesimpulan selektor no 1 pada paragraf ini</p>
            <p>This is a paragraph. Terangkan kesimpulan selektor no 2 pada paragraf ini</p>
        </div>
        <p>This is a paragraph. Terangkan kesimpulan selektor no 3 pada paragraf ini</p>
        <p>This is a paragraph. Terangkan kesimpulan selektor no 4 pada paragraf ini</p>
    </body>
</html>
