        <article>
            <h1>Judul Artikel</h1>
            <form>

            <fieldset>
                <legend>Informasi Pribadi</legend>

                <div class="form-row">
                    <div class="form-group">
                        <label>Nama</label>
                        <input type="text" required>
                    </div>

                    <div class="form-group">
                        <label>No. Telepon (XXXX-XXXXXX)</label>
                        <input type="tel"
                               pattern="[0-9]{4}-[0-9]{6}"
                               placeholder="1234-567890"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Alamat Email</label>
                        <input type="email"
                               placeholder="nama@domain.com"
                               required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tanggal Lahir</label>
                        <input type="date"
                               min="1987-01-01"
                               max="1993-01-01"
                               required>
                    </div>
                </div>

            </fieldset>

            <fieldset>
                <legend>Permintaan Pertemuan</legend>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tujuan Pertemuan</label>
                        <input type="text" required>
                    </div>

                    <div class="form-group">
                        <label>Tingkat Kepentingan (0 - 10)</label>
                        <input type="range"
                               min="0"
                               max="10"
                               value="5">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tanggal</label>
                        <input type="date"
                               id="tanggal"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Waktu (17:00 - 21:00 WIB)</label>
                        <input type="time"
                               min="17:00"
                               max="21:00"
                               required>
                    </div>
                </div>

            </fieldset>

            <button type="submit">Submit</button>

        </form>

        <p>mantap banget pokonya mah</p>
    <footer>
        <p>@amlfimariani_ 30 Juli 2025</p><!--sesuai selera-->
    </footer>

    </article>
</section>

<script>
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("tanggal").setAttribute("min", today);
</script>
