<HTML>
    <HEAD>
        <title> mengakses obejk password</title>
    </HEAD>
    <BODY>
        <form name = "formtes"
              action="testform.htm"
              method="post">
        <pre>
                password Pengganti : <input type="PASSWORD"
                name="password_1">
                password Sekali lagi : <INPUT TYPE ="PASSWORD"
                name="password_2">

        <input type="button"
                name="tombolProses"

            function cekPassword() {
                if (document.formTes.password_1.value !=

                else
                    window.location.href = "testform.htm";
            }
        </script>
